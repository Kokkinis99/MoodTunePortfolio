<!doctype html>
<html lang="en">
<head>
  <script>
    window.__entryColor = (function () {
      var c = { happy: '#78b853', sad: '#a18fff', calm: '#5c9ead', angry: '#ff3f52' };
      return c[new URLSearchParams(location.search).get('mood')] || null;
    })();
    if (window.__entryColor) {
      document.documentElement.style.background = window.__entryColor;
    }
  </script>
  <meta charset="utf-8">
  <title>MoodTunePortfolio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    #mood-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      opacity: 1;
      transition: opacity 150ms cubic-bezier(0.455, 0.03, 0.515, 0.955);
      pointer-events: none;
    }
    #mood-overlay.fade-out {
      opacity: 0;
    }
    @media (prefers-reduced-motion: reduce) {
      #mood-overlay { transition: none; }
    }
  </style>
</head>
<body>
  <div id="mood-overlay"></div>
  <script>
    if (window.__entryColor) {
      document.getElementById('mood-overlay').style.background = window.__entryColor;
    } else {
      document.getElementById('mood-overlay').style.display = 'none';
    }
  </script>
  <app-root></app-root>
</body>
</html>
